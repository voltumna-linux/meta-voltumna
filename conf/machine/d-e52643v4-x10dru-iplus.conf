#@TYPE: Machine
#@NAME: d-e52643v4-x10dru-i+
#@DESCRIPTION: Machine configuration for a dual-socket E5 2643v4 Intel processor on Supermicro X10DRU-i+ motherboard (64-bit)

require include/intel-common.inc
require include/tune-broadwell.inc

MACHINEOVERRIDES =. "d-e52643v4:x10dru-iplus:"

IMAGE_FSTYPES = "tar"

PRIMARY_NETIF = "eth0"
ROOT = "/dev/sda2"

EXTRA_IMAGEDEPENDS += "grub-efi"
PREFERRED_PROVIDER_virtual/bootloader = "grub-efi"

MACHINE_EXTRA_RRECOMMENDS:remove = "linux-firmware"
# bios
MACHINE_EXTRA_RRECOMMENDS:append = " intel-ethernet-700-firmware"

OPENBLAS_TARGET = "HASWELL"

COMPATIBLE_MACHINE:pn-dpdk = "d-e52643v4-x10dru-iplus"
COMPATIBLE_MACHINE:pn-nativesdk-dpdk = "(.*)"

