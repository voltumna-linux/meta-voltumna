#@TYPE: Machine
#@NAME: s-4305ue-up-whl01
#@DESCRIPTION: Machine configuration for a single-socket 4305UE Intel processor on UP-Board UP-WHL01 motherboard (64-bit)

require include/intel-common.inc
require include/tune-skylake.inc

MACHINEOVERRIDES =. "s-4305ue:up-whl01:"

IMAGE_FSTYPES = "tar wic wic.bmap"

PRIMARY_NETIF = "enp1s0"
ROOT = "/dev/sda2"

EXTRA_IMAGEDEPENDS += "grub-efi"

WKS_FILE = "grub-bootdisk-microcode.wks.in"

MACHINE_EXTRA_RRECOMMENDS_remove = "linux-firmware"
#FIXME bios opencl-icd-loader opencl-clang
MACHINE_EXTRA_RRECOMMENDS_append = " intel-ethernet-700-firmware dpdk"

OPENBLAS_TARGET = "HASWELL"
