#@TYPE: Machine
#@NAME: MVME6100 machine
#@DESCRIPTION: Machine configuration for MVME6100

require conf/machine/include/artesyn.inc
require conf/machine/include/tune-ppc7450.inc

SERIAL_CONSOLE = "9600 ttyS0"

KERNEL_IMAGETYPE = "dtbImage.mvme6100"

MACHINE_FEATURES = "pci serial"

IMAGE_FSTYPES ?= "tar"

ALLOW_EMPTY_${KERNEL_PACKAGE_NAME}-devicetree = "1"

MACHINEOVERRIDES =. "vme:ppc7400:"

MACHINE_ESSENTIAL_EXTRA_RRECOMMENDS_append = " kernel-modules"

PRIMARY_NETIF = "eth0"
ROOT = ""
