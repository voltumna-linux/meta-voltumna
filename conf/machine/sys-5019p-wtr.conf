#@TYPE: Machine
#@NAME: Customized Supermicro SYS-5019P-WTR
#@DESCRIPTION: Machine configuration for customized Supermicro SYS-5019P-WTR (64-bit)

require include/intel-common.inc
require include/tune-cascadelake.inc

IMAGE_FSTYPES = "tar"

PRIMARY_NETIF = "enp26s0f0"
ROOT = "/dev/sda2"

EXTRA_IMAGEDEPENDS += "grub-efi"

WKS_FILE = "grub-bootdisk-microcode.wks.in"

MACHINE_EXTRA_RRECOMMENDS_remove = "linux-firmware"
MACHINE_EXTRA_RRECOMMENDS_append = " bios intel-ethernet-700-firmware numactl"

OPENBLAS_TARGET = "SKYLAKEX"
